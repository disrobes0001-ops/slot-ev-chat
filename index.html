<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="theme-color" content="#0e1117">
<title>期待値メモ</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="期待値メモ">
<meta name="application-name" content="期待値メモ">
<style>
  :root{
    --bg:#0e1117; --bg2:#161b22; --card:#1c2230; --line:#2a3346;
    --txt:#e6edf3; --sub:#8b97a8; --acc:#3b82f6; --bot:#232b3d;
    --plus:#22c55e; --gold:#fbbf24; --radius:16px;
    --acc-soft-bg:rgba(59,130,246,.15); --acc-soft-fg:#9db4ff;
  }
  :root[data-theme="light"]{
    --bg:#f4f5f7; --bg2:#ffffff; --card:#ffffff; --line:#e3e6eb;
    --txt:#161a22; --sub:#6b7280; --acc:#2563eb; --bot:#eef1f6;
    --plus:#16a34a; --gold:#b45309;
    --acc-soft-bg:rgba(37,99,235,.08); --acc-soft-fg:#2563eb;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    -webkit-text-size-adjust:100%;
    display:flex; flex-direction:column; overflow:hidden;
    height:100vh;
    height:100dvh;
    height:var(--app-vh, 100dvh);
  }
  header{
    flex:0 0 auto; z-index:20;
    background:var(--bg);
    border-bottom:1px solid var(--line);
    padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
    display:flex; align-items:center; gap:8px;
  }
  .title{display:flex; align-items:center; gap:8px; font-size:18px; font-weight:800; letter-spacing:.02em; flex:1; min-width:0;}
  .title .dot{width:9px;height:9px;border-radius:50%;background:var(--acc);box-shadow:0 0 10px var(--acc); flex:0 0 auto;}
  .hbtn{flex:0 0 auto; background:var(--bg2); color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:8px 12px; font-size:13px; font-weight:700;}
  .hbtn.acc{color:var(--acc-soft-fg); border-color:var(--acc-soft-fg); background:var(--acc-soft-bg);}
  .hbtn.icon{padding:8px 10px; font-size:15px;}

  #chatView{flex:1; min-height:0; display:flex; flex-direction:column;}
  #log{flex:1; overflow-y:auto; padding:14px 12px 10px; -webkit-overflow-scrolling:touch;}
  .empty{text-align:center; color:var(--sub); padding:50px 20px; font-size:13.5px; line-height:1.9;}
  .empty b{color:var(--txt);}

  .row{display:flex; margin-bottom:12px;}
  .row.me{justify-content:flex-end;}
  .row.bot{justify-content:flex-start;}
  .bubble{max-width:82%; padding:10px 13px; border-radius:16px; font-size:14.5px; line-height:1.6; white-space:pre-wrap; word-break:break-word;}
  .row.me .bubble{background:var(--acc); color:#fff; border-bottom-right-radius:4px;}
  .row.bot .bubble{background:var(--bot); color:var(--txt); border-bottom-left-radius:4px;}
  .time{font-size:10px; color:var(--sub); margin-top:3px; text-align:right;}
  .row.bot .time{text-align:left;}

  .ecard{max-width:82%; background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden;}
  .row.me .ecard{margin-left:auto; border-bottom-right-radius:4px;}
  .row.bot .ecard{border-bottom-left-radius:4px;}
  .ecard + .ecard{margin-top:8px;}
  .ecard img{width:100%; max-height:220px; object-fit:cover; display:block; cursor:pointer;}
  .ecard .body{padding:10px 12px;}
  .ecard .hd{display:flex; align-items:baseline; gap:6px; flex-wrap:wrap;}
  .ecard .kishu{font-size:15px; font-weight:800;}
  .ecard .date{margin-left:auto; font-size:11px; color:var(--sub);}
  .ecard .ev{margin-top:7px; font-size:20px; font-weight:900; color:var(--gold);}
  .ecard .ev .u{font-size:13px; font-weight:700; margin-left:2px; color:var(--sub);}
  .ecard .ev.none{font-size:13px; font-weight:700; color:var(--sub);}
  .ecard .memo{margin-top:6px; font-size:12.5px; color:var(--sub); line-height:1.55; white-space:pre-wrap; word-break:break-word;}
  .ecard .actions{display:flex; gap:6px; margin-top:9px;}
  .ecard .actions button{flex:1; padding:6px; font-size:11.5px; font-weight:700; border-radius:8px; border:1px solid var(--line); background:var(--bg2); color:var(--sub);}

  .stack{display:flex; flex-direction:column; gap:8px; max-width:82%;}
  .row.bot .stack{align-items:flex-start;}

  #inputbar{flex:0 0 auto; display:flex; align-items:flex-end; gap:8px; padding:10px 12px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); background:var(--bg);}
  .roundbtn{flex:0 0 auto; width:42px; height:42px; border-radius:50%; border:none; background:var(--acc); color:#fff; font-size:22px; font-weight:400; display:flex; align-items:center; justify-content:center;}
  .roundbtn.plus{background:var(--plus);}
  #qtext{flex:1; min-width:0; padding:11px 14px; font-size:15px; background:var(--bg2); color:var(--txt); border:1px solid var(--line); border-radius:21px; resize:none; max-height:110px; font-family:inherit;}
  #qtext::placeholder{color:var(--sub);}
  .sendbtn{flex:0 0 auto; width:42px; height:42px; border-radius:50%; border:none; background:var(--acc); color:#fff; font-size:16px;}
  .sendbtn:disabled{opacity:.4;}

  #listView{flex:1; min-height:0; display:none; flex-direction:column;}
  #listView.on{display:flex;}
  #chatView.off{display:none;}
  .search{margin:10px 12px 6px; width:calc(100% - 24px); padding:10px 13px; font-size:14.5px; background:var(--bg2); color:var(--txt); border:1px solid var(--line); border-radius:12px;}
  #listBody{flex:1; overflow-y:auto; padding:6px 12px 20px;}
  .lcard{background:var(--card); border:1px solid var(--line); border-radius:14px; margin-bottom:10px; overflow:hidden; display:flex;}
  .lcard img{width:88px; height:88px; object-fit:cover; flex:0 0 auto;}
  .lcard .noimg{width:88px; height:88px; flex:0 0 auto; background:var(--bg2); display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--sub);}
  .lcard .info{flex:1; min-width:0; padding:9px 11px;}
  .lcard .hd{display:flex; align-items:baseline; gap:6px;}
  .lcard .kishu{font-size:14px; font-weight:800; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .lcard .date{margin-left:auto; font-size:10.5px; color:var(--sub); flex:0 0 auto;}
  .lcard .ev{font-size:16px; font-weight:900; color:var(--gold); margin-top:3px;}
  .lcard .ev .u{font-size:11px; color:var(--sub); font-weight:700;}
  .lcard .memo{font-size:11.5px; color:var(--sub); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  .fab{position:fixed; right:16px; bottom:calc(16px + env(safe-area-inset-bottom)); z-index:30; width:56px; height:56px; border-radius:50%; border:none; background:var(--acc); color:#fff; font-size:28px; font-weight:300; box-shadow:0 8px 22px rgba(59,130,246,.5);}

  .ovl{position:fixed; inset:0; z-index:40; background:rgba(0,0,0,.6); display:none; align-items:flex-end;}
  .ovl.on{display:flex;}
  .sheet{width:100%; max-height:92vh; overflow-y:auto; background:var(--bg2); border-radius:20px 20px 0 0; padding:16px 16px calc(22px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); transition:transform .25s ease;}
  .sheet.dragging{transition:none;}
  .sheet h2{margin:2px 0 14px; font-size:17px;}
  .sheetHandle{margin:-16px -16px 0; padding:16px 0 16px; touch-action:none; cursor:grab;}
  .grip{width:40px;height:4px;border-radius:2px;background:var(--line);margin:0 auto;}
  label{display:block; font-size:12px; color:var(--sub); font-weight:700; margin:12px 0 5px;}
  .hint{color:var(--sub); font-weight:500; font-size:11px;}
  input,select,textarea{width:100%; padding:11px 12px; font-size:15px; background:var(--card); color:var(--txt); border:1px solid var(--line); border-radius:10px; font-family:inherit;}
  textarea{min-height:96px; resize:vertical; line-height:1.6;}
  .f3{display:grid; grid-template-columns:1.3fr .9fr; gap:10px;}

  .imgdrop{margin-top:8px; display:block; border:2px dashed var(--line); border-radius:14px; padding:22px 14px; text-align:center; color:var(--sub); font-size:12.5px; line-height:1.8; cursor:pointer; background:var(--card);}
  .imgdrop.drag{border-color:var(--acc); color:var(--acc);}
  .imgdrop input{display:none;}
  #previewWrap{margin-top:8px; position:relative; display:none;}
  #previewWrap img{width:100%; max-height:200px; object-fit:cover; border-radius:12px;}
  #previewWrap button{position:absolute; top:6px; right:6px; background:rgba(0,0,0,.6); color:#fff; border:none; border-radius:50%; width:26px; height:26px; font-size:14px;}

  .fillbtn{margin-top:8px; width:100%; padding:10px; font-size:13px; font-weight:700; border-radius:10px; border:1px solid var(--acc-soft-fg); background:var(--acc-soft-bg); color:var(--acc-soft-fg);}
  .save{margin-top:20px; width:100%; padding:14px; font-size:16px; font-weight:800; border:none; border-radius:12px; background:var(--acc); color:#fff;}
  .del{margin-top:8px; width:100%; padding:12px; font-size:14px; font-weight:700; border:1px solid var(--line); border-radius:12px; background:transparent; color:#ef4444;}
  .cancel{margin-top:8px; width:100%; padding:12px; font-size:14px; font-weight:700; border:1px solid var(--line); border-radius:12px; background:transparent; color:var(--sub);}

  .catpick{display:flex; gap:7px; flex-wrap:wrap; margin-top:8px;}
  .catpick .cp{flex:1; min-width:88px; text-align:center; padding:11px 4px; font-size:13px; font-weight:700; border-radius:10px; background:var(--card); border:1px solid var(--line); color:var(--sub); cursor:pointer;}
  .catpick .cp.on{background:var(--acc); border-color:var(--acc); color:#fff;}

  #lightbox{position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.92); display:none; align-items:center; justify-content:center; padding:20px;}
  #lightbox.on{display:flex;}
  #lightbox img{max-width:100%; max-height:100%; border-radius:8px;}

  .msec{margin-bottom:20px;}
  .msec h3{font-size:15px; margin:2px 0 2px;}
  .msec h4{font-size:12.5px; font-weight:800; color:var(--sub); margin:14px 0 2px;}
  .dtblwrap{overflow-x:auto; margin-top:6px; border:1px solid var(--line); border-radius:10px;}
  table.dtbl{border-collapse:collapse; width:100%; font-size:12px; white-space:nowrap; font-variant-numeric:tabular-nums;}
  table.dtbl th,table.dtbl td{padding:6px 9px; border-bottom:1px solid var(--line); text-align:right;}
  table.dtbl th{color:var(--sub); font-size:10.5px; background:var(--bg2); text-align:right;}
  table.dtbl td:first-child,table.dtbl th:first-child{text-align:left; font-weight:700;}
  table.dtbl td.pl{color:var(--plus);} table.dtbl td.mi{color:var(--sub);}
</style>
</head>
<body>

<header>
  <div class="title"><span class="dot"></span><span id="hTitle">期待値メモ</span></div>
  <button class="hbtn icon" id="machineBtn" title="機種データ">📊</button>
  <button class="hbtn icon" id="settingsBtn" title="設定">⚙</button>
  <button class="hbtn acc" id="toListBtn">記録一覧</button>
</header>

<div id="chatView">
  <div id="log"></div>
  <div id="inputbar">
    <button class="roundbtn plus" id="openAddBtn" title="記録を追加">＋</button>
    <textarea id="qtext" rows="1" placeholder="例）北斗 500G 期待値ある？"></textarea>
    <button class="sendbtn" id="sendBtn">➤</button>
  </div>
</div>

<div id="listView">
  <input class="search" id="listSearch" placeholder="タイトル・本文で検索">
  <div id="listBody"></div>
</div>

<button class="fab" id="fabAdd" style="display:none;">＋</button>

<div class="ovl" id="formOvl">
  <div class="sheet">
    <div class="sheetHandle"><div class="grip"></div></div>
    <h2 id="formTitle">記録を追加</h2>

    <label>画像</label>
    <label class="imgdrop" id="imgDrop" for="fImg">
      <span id="dropHint">タップして画像を選択<br>貼り付け(Ctrl+V) / ドラッグ&ドロップにも対応</span>
      <input id="fImg" type="file" accept="image/*" capture="environment">
    </label>
    <div id="previewWrap"><img id="previewImg"><button id="clearImg">✕</button></div>

    <label>本文（貼った画像の説明・狙い目などをそのまま貼り付け）</label>
    <textarea id="fMemo" placeholder="例）リゼロ 3のつく日 天井間近 期待値2500枚くらいありそう ゾーン濃厚"></textarea>
    <button class="fillbtn" id="autoFillBtn">📥 本文から期待値を自動入力</button>

    <div class="f3">
      <div>
        <label>期待値</label>
        <input id="fEv" type="number" step="any" placeholder="例）2500" inputmode="decimal">
      </div>
      <div>
        <label>単位</label>
        <select id="fUnit">
          <option value="枚">枚</option>
          <option value="円">円</option>
          <option value="G">G</option>
        </select>
      </div>
    </div>

    <label>タイトル <span class="hint">(検索用・空欄なら本文の先頭を使用)</span></label>
    <input id="fTitle" placeholder="例）リゼロ 3番台">

    <label>日付</label>
    <input id="fDate" type="date">

    <button class="save" id="saveBtn">保存</button>
    <button class="del" id="delBtn" style="display:none;">この記録を削除</button>
    <button class="cancel" id="cancelBtn">キャンセル</button>
  </div>
</div>

<div class="ovl" id="settingsOvl">
  <div class="sheet">
    <div class="sheetHandle"><div class="grip"></div></div>
    <h2>設定</h2>
    <label>テーマ</label>
    <div class="catpick" id="themePick">
      <div class="cp" data-t="dark">ダーク基調</div>
      <div class="cp" data-t="light">白基調</div>
      <div class="cp" data-t="auto">端末に合わせる</div>
    </div>
    <button class="cancel" id="settingsCloseBtn">閉じる</button>
  </div>
</div>

<div class="ovl" id="machineOvl">
  <div class="sheet">
    <div class="sheetHandle"><div class="grip"></div></div>
    <h2>機種データ</h2>
    <div class="hint">送ってもらった画像から読み取って登録した、機種ごとの期待値・狙い目の早見表です。チャットで「機種名 ○○G 期待値ある？」のように聞くと、この表を引いて回答します。</div>
    <div id="machineBody"></div>
    <button class="cancel" id="machineCloseBtn">閉じる</button>
  </div>
</div>

<div id="lightbox"><img id="lbImg"></div>

  (function setupVH(){

  function resolveTheme(pref){ return pref === 'auto' ? (mq.matches ? 'light' : 'dark') : pref; }

    var pref = localStorage.getItem(THEME_KEY) || 'dark';
    var resolved = resolveTheme(pref);
    document.documentElement.setAttribute('data-theme', resolved);
    var mc = document.querySelector('meta[name=theme-color]');
    if(mc) mc.content = THEME_BG[resolved];
    var picks = document.querySelectorAll('#themePick .cp');
    for(var i=0;i<picks.length;i++) picks[i].classList.toggle('on', picks[i].getAttribute('data-t') === pref);
  }
  mq.addEventListener('change', function(){ if((localStorage.getItem(THEME_KEY)||'dark') === 'auto') applyTheme(); });
  applyTheme();

  document.getElementById('settingsBtn').addEventListener('click', function(){
    document.getElementById('settingsOvl').classList.add('on');
  });
  document.getElementById('settingsCloseBtn').addEventListener('click', function(){
    document.getElementById('settingsOvl').classList.remove('on');
  });
  document.getElementById('settingsOvl').addEventListener('click', function(e){
    if(e.target === this) this.classList.remove('on');

  var themePickEl = document.getElementById('themePick');

  function findBracket(table, g){

  function findNeraime(machine, opts){
    if(opts.settingChanged){
      return { fromG: machine.neraime.settingChanged, label: '設定変更後' };
    }
    var rows = machine.neraime.normal;
    if(opts.diff == null){
      var base = rows.filter(function(r){ return r.diffMin == null; })[0];
      return { fromG: base.fromG, label: '差枚非考慮' };
    }
    var match = null;
    for(var i=0;i<rows.length;i++){
      var r = rows[i];
      if(r.diffMin != null && opts.diff >= r.diffMin && opts.diff <= r.diffMax){ match = r; break; }
    }
    if(!match) match = rows.filter(function(r){ return r.diffMin == null; })[0];
    var label = match.diffMin == null ? '差枚非考慮' : (match.diffMin+'枚〜'+match.diffMax+'枚');
    return { fromG: match.fromG, label: label };
  }

      for(var j=0;j<m.aliases.length;j++){

  function guruRangeLabel(r){

    if(r.min === r.max) return r.min+'回';

    return r.min+'〜'+r.max+'回';
  }
  function findNeraimeGuru(machine, opts){

    if(opts.point == null){
      return { fromG: rows[0].fromG, label: opts.after ? '喰ポイント獲得回数 未指定' : '不問' };
    }
    var match = null;
    for(var i=0;i<rows.length;i++){
      var r = rows[i];
      var minOk = r.min == null || opts.point >= r.min;
      var maxOk = r.max == null || opts.point <= r.max;
      if(minOk && maxOk){ match = r; break; }

  function tryHokutoLookup(machine, query){
    var gMatch = query.match(/(\d+)\s*(?:[GgＧ]|ゲーム)/);
    var settingChanged = /設定変更後|設変/.test(query);
    var diffMatch = query.match(/差枚[^\d\-－]{0,4}([\-－]?[\d,]+)/) || query.match(/([\-－][\d,]+)\s*枚/);
    var diff = diffMatch ? Number(diffMatch[1].replace(/,/g,'').replace('－','-')) : null;

    if(!gMatch){
      var lines = ['『'+machine.name+'』のデータがあります。G数を含めて聞いてください（例：「北斗 500G 期待値ある？」）。', '', '狙い目の目安（'+machine.denomInfo+'）：'];
      machine.neraime.normal.forEach(function(r){
        var label = r.diffMin == null ? '差枚非考慮' : (r.diffMin+'枚〜'+r.diffMax+'枚');
        lines.push('・'+label+'：'+r.fromG+'Gから');
      });
      lines.push('・設定変更後：'+machine.neraime.settingChanged+'Gから');
      return { text: lines.join('\n'), matchIds: [] };
    }

    var g = Number(gMatch[1]);
    var table = settingChanged ? machine.tables.settingChanged : machine.tables.normal;

    var ner = findNeraime(machine, { settingChanged: settingChanged, diff: diff });

  function trySimpleLookup(machine, query){
    var gMatch = query.match(/(\d+)\s*(?:[GgＧ]|ゲーム)/);

  // ---------- image compression ----------
  function readAndCompress(file, cb){
    if(!file || file.type.indexOf('image') === -1) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      var img = new Image();
      img.onload = function(){
        var maxW = 800;
        var scale = Math.min(1, maxW / img.width);
        var w = Math.round(img.width * scale);
        var h = Math.round(img.height * scale);
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        cb(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ---------- EV auto extraction ----------
  function extractEV(text){
    if(!text) return null;
    var m = text.match(/期待値[^0-9\-－]{0,8}([\-－]?[\d,]+\.?\d*)\s*(枚|円|Ｇ|G)/);
    if(!m) m = text.match(/差枚[^0-9\-－]{0,8}([\-－]?[\d,]+\.?\d*)\s*(枚)/);
    if(!m) m = text.match(/([\-－]?[\d,]+\.?\d*)\s*(枚|円|Ｇ|G)/);
    if(!m) return null;
    var num = m[1].replace(/,/g,'').replace('－','-');
    var unit = m[2] === 'Ｇ' ? 'G' : m[2];
    return { val: Number(num), unit: unit };
  }
  function suggestTitle(text){
    if(!text) return '';
    var t = text.split(/[\n。\s]/)[0] || '';
    return t.slice(0,20);
  }

  // ---------- form sheet ----------
  var formOvl = document.getElementById('formOvl');
  var fDate = document.getElementById('fDate');
  var fTitle = document.getElementById('fTitle');
  var fEv = document.getElementById('fEv');
  var fUnit = document.getElementById('fUnit');
  var fMemo = document.getElementById('fMemo');
  var fImg = document.getElementById('fImg');
  var imgDrop = document.getElementById('imgDrop');
  var previewWrap = document.getElementById('previewWrap');
  var previewImg = document.getElementById('previewImg');
  var delBtn = document.getElementById('delBtn');
  var formTitle = document.getElementById('formTitle');

  function openForm(entry){
    editingId = entry ? entry.id : null;
    formTitle.textContent = entry ? '記録を編集' : '記録を追加';
    fDate.value = entry ? (entry.date||todayStr()) : todayStr();
    fTitle.value = entry ? (entry.title||'') : '';
    fEv.value = entry && entry.evVal !== '' && entry.evVal != null ? entry.evVal : '';
    fUnit.value = entry ? (entry.evUnit||'枚') : '枚';
    fMemo.value = entry ? (entry.memo||'') : '';
    pendingImage = entry ? (entry.image||null) : null;
    if(pendingImage){ previewImg.src = pendingImage; previewWrap.style.display='block'; }
    else { previewWrap.style.display='none'; previewImg.src=''; }
    fImg.value = '';
    delBtn.style.display = entry ? 'block' : 'none';
    formOvl.classList.add('on');
  }
  function closeForm(){ formOvl.classList.remove('on'); editingId=null; pendingImage=null; }

  document.getElementById('openAddBtn').addEventListener('click', function(){ openForm(null); });
  document.getElementById('fabAdd').addEventListener('click', function(){ openForm(null); });
  document.getElementById('cancelBtn').addEventListener('click', closeForm);
  formOvl.addEventListener('click', function(e){ if(e.target === formOvl) closeForm(); });

  function handleImageFile(file){
    if(!file) return;
    readAndCompress(file, function(dataUrl){
      pendingImage = dataUrl;
      previewImg.src = dataUrl;
      previewWrap.style.display = 'block';
    });
  }
  fImg.addEventListener('change', function(){ handleImageFile(fImg.files && fImg.files[0]); });
  document.getElementById('clearImg').addEventListener('click', function(e){
    e.preventDefault();
    pendingImage = null; fImg.value=''; previewWrap.style.display='none'; previewImg.src='';
  });
  imgDrop.addEventListener('dragover', function(e){ e.preventDefault(); imgDrop.classList.add('drag'); });
  imgDrop.addEventListener('dragleave', function(){ imgDrop.classList.remove('drag'); });
  imgDrop.addEventListener('drop', function(e){
    e.preventDefault(); imgDrop.classList.remove('drag');
    var f = e.dataTransfer.files && e.dataTransfer.files[0];
    if(f) handleImageFile(f);
  });
  document.addEventListener('paste', function(e){
    if(!formOvl.classList.contains('on')) return;
    var cd = e.clipboardData || window.clipboardData;
    if(!cd || !cd.items) return;
    for(var i=0;i<cd.items.length;i++){
      if(cd.items[i].type && cd.items[i].type.indexOf('image') !== -1){
        handleImageFile(cd.items[i].getAsFile());
        e.preventDefault();
        break;
      }
    }
  });

  document.getElementById('autoFillBtn').addEventListener('click', function(){
    var ev = extractEV(fMemo.value);
    if(ev){ fEv.value = ev.val; fUnit.value = ev.unit; }
    if(!fTitle.value.trim()){ fTitle.value = suggestTitle(fMemo.value); }
    if(!ev) alert('本文から期待値の数値を検出できませんでした。手動で入力してください。');
  });

  document.getElementById('saveBtn').addEventListener('click', function(){
    var title = fTitle.value.trim();
    var memo = fMemo.value.trim();
    if(!title && !memo){ alert('本文かタイトルのどちらかは入力してください'); return; }
    var data = {
      id: editingId || uid(),
      title: title,
      date: fDate.value || todayStr(),
      evVal: fEv.value === '' ? '' : Number(fEv.value),
      evUnit: fUnit.value,
      memo: memo,
      image: pendingImage,
      createdAt: editingId ? (entries.find(function(x){return x.id===editingId;})||{}).createdAt || Date.now() : Date.now()
    };
    if(editingId){
      var idx = entries.findIndex(function(x){ return x.id === editingId; });
      if(idx !== -1) entries[idx] = data;
    } else {
      entries.push(data);
      timeline.push({ id: uid(), type:'entry', entryId: data.id, createdAt: Date.now() });
      saveTimeline();
    }
    saveEntries();
    closeForm();
    renderLog();
    renderList(document.getElementById('listSearch').value);
  });

  delBtn.addEventListener('click', function(){
    if(!editingId) return;
    if(!confirm('この記録を削除しますか？')) return;
    entries = entries.filter(function(x){ return x.id !== editingId; });
    timeline = timeline.filter(function(m){ return !(m.type==='entry' && m.entryId===editingId); });
    saveEntries(); saveTimeline();
    closeForm();
    renderLog();
    renderList(document.getElementById('listSearch').value);
  });

  // edit from card (event delegation)
  document.addEventListener('click', function(e){
    var eb = e.target.closest && e.target.closest('.editBtn');
    if(eb){
      var entry = entries.find(function(x){ return x.id === eb.getAttribute('data-id'); });
      if(entry) openForm(entry);
      return;
    }
    var lc = e.target.closest && e.target.closest('.lcard');
    if(lc){
      var entry2 = entries.find(function(x){ return x.id === lc.getAttribute('data-id'); });
      if(entry2) openForm(entry2);
      return;
    }
    var im = e.target.closest && e.target.closest('.lbtrigger');
    if(im){
      document.getElementById('lbImg').src = im.getAttribute('data-src');
      document.getElementById('lightbox').classList.add('on');
      return;
    }
  });
  document.getElementById('lightbox').addEventListener('click', function(){
    this.classList.remove('on');
  });

  // ---------- query matching ----------
  var STOPWORDS = ['期待値','狙い目','ある','あるか','あるかな','あります','ですか','でしょうか','教えて','おしえて','くらい','ぐらい','は','の','を','か','？','?','！','!'];
  function cleanKeyword(text){
    var s = text;
    STOPWORDS.forEach(function(w){ s = s.split(w).join(' '); });
    return s.replace(/[、。,\.]/g,' ').trim();
  }
  function tokenize(text){
    return cleanKeyword(text).split(/\s+/).map(function(t){return t.trim();}).filter(Boolean);
  }

  function findMatches(query){
    var tokens = tokenize(query);
    var matches;
    var fallback = false;
    if(!tokens.length){
      var t = todayStr();
      matches = entries.filter(function(e){ return e.date === t; });
      fallback = true;
    } else {
      matches = entries.map(function(e){
        var hay = (getTitle(e) + ' ' + (e.memo||'')).toLowerCase();
        var score = tokens.filter(function(tok){ return hay.indexOf(tok.toLowerCase()) !== -1; }).length;
        return { e: e, score: score };
      }).filter(function(x){ return x.score > 0; })
        .sort(function(a,b){ return b.score - a.score || (b.e.date||'').localeCompare(a.e.date||'') || b.e.createdAt-a.e.createdAt; })
        .map(function(x){ return x.e; });
    }
    var total = matches.length;
    return { matches: matches.slice(0,5), fallback: fallback, total: total };
  }

  function answerQuery(query){
    var r = findMatches(query);
    if(!r.matches.length){
      return { text: '「'+query+'」に一致する記録が見つかりませんでした。機種名などのキーワードを含めて聞いてみてください。', matchIds: [] };
    }
    var text = r.fallback ? 'キーワードの指定がなかったので、今日の記録を表示します：' : '見つかった記録です：';
    if(r.total > r.matches.length) text += '（他 '+(r.total - r.matches.length)+' 件あり）';
    return { text: text, matchIds: r.matches.map(function(e){ return e.id; }) };
  }

  // ---------- chat input ----------
  var qtext = document.getElementById('qtext');
  var sendBtn = document.getElementById('sendBtn');

  function autoGrow(){ qtext.style.height='auto'; qtext.style.height=Math.min(qtext.scrollHeight,110)+'px'; }
  qtext.addEventListener('input', autoGrow);
  qtext.addEventListener('keydown', function(e){
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendQuery(); }
  });
  sendBtn.addEventListener('click', sendQuery);

  function sendQuery(){
    var text = qtext.value.trim();
    if(!text) return;
    timeline.push({ id: uid(), type:'user_query', text: text, createdAt: Date.now() });
    var ans = tryMachineLookup(text) || answerQuery(text);
    timeline.push({ id: uid(), type:'bot_reply', text: ans.text, matchIds: ans.matchIds, createdAt: Date.now() });
    saveTimeline();
    qtext.value = '';
    autoGrow();
    renderLog();
  }

  // ---------- view toggle ----------
  var toListBtn = document.getElementById('toListBtn');
  var hTitle = document.getElementById('hTitle');
  var fabAdd = document.getElementById('fabAdd');
  var inList = false;
  toListBtn.addEventListener('click', function(){
    inList = !inList;
    if(inList){
      chatView.classList.add('off');
      listView.classList.add('on');
      fabAdd.style.display = 'block';
      toListBtn.textContent = 'チャットへ戻る';
      hTitle.textContent = '記録一覧';
      renderList(document.getElementById('listSearch').value);
    } else {
      chatView.classList.remove('off');
      listView.classList.remove('on');
      fabAdd.style.display = 'none';
      toListBtn.textContent = '記録一覧';
      hTitle.textContent = '期待値メモ';
    }
  });
  document.getElementById('listSearch').addEventListener('input', function(){ renderList(this.value); });

  // ---------- swipe-down-to-close for bottom sheets ----------
  function enableSwipeToClose(ovlId, onClose){
    var ovl = document.getElementById(ovlId);
    var sheet = ovl.querySelector('.sheet');
    var handle = ovl.querySelector('.sheetHandle');
    if(!handle) return;
    var startY = 0, dy = 0, dragging = false;
    function close(){ if(onClose) onClose(); else ovl.classList.remove('on'); }
    function start(y){ dragging = true; dy = 0; sheet.classList.add('dragging'); startY = y; }
    function move(y){
      if(!dragging) return;
      dy = Math.max(0, y - startY);
      sheet.style.transform = 'translateY('+dy+'px)';
    }
    function end(){
      if(!dragging) return;
      dragging = false;
      sheet.classList.remove('dragging');
      if(dy > 80){
        sheet.style.transform = 'translateY(100%)';
        setTimeout(function(){ close(); sheet.style.transform = ''; }, 200);
      } else {
        sheet.style.transform = '';
      }
    }
    handle.addEventListener('touchstart', function(e){ start(e.touches[0].clientY); }, {passive:true});
    handle.addEventListener('touchmove', function(e){ move(e.touches[0].clientY); }, {passive:true});
    handle.addEventListener('touchend', end);
    handle.addEventListener('mousedown', function(e){ start(e.clientY); e.preventDefault(); });
    window.addEventListener('mousemove', function(e){ if(dragging) move(e.clientY); });
    window.addEventListener('mouseup', end);
  }
  enableSwipeToClose('formOvl', closeForm);
  enableSwipeToClose('settingsOvl');
  enableSwipeToClose('machineOvl');

  renderLog();

  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
})();
</script>
</body>
</html>
